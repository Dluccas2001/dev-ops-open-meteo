services:
  api:
    build:
      context: .
      dockerfile: ContainerFile
    image: weather-mlops-api:local
    container_name: weather_mlops_api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: weather_mlops_postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d weather"]
      interval: 5s
      timeout: 5s
      retries: 10

  mlflow:
    image: python:3.11-slim
    container_name: weather_mlops_mlflow
    working_dir: /mlflow
    command: >
      sh -c "pip install --no-cache-dir mlflow==2.19.0 &&
             mlflow server --host 0.0.0.0 --port 5000
             --backend-store-uri sqlite:////mlflow/mlflow.db
             --default-artifact-root /mlflow/artifacts"
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    restart: unless-stopped

volumes:
  postgres-data:
  mlflow-data:

