name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-test-build:
    name: Lint, Test, Build and Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Ruff lint
        run: python -m ruff check .

      - name: Ruff format check
        run: python -m ruff format --check .

      - name: Pytest
        run: python -m pytest

      - name: Data quality placeholder
        run: python -m src.quality.checks

      - name: Build image
        run: docker build -f ContainerFile -t weather-mlops-api:ci .

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "0"

      - name: Validate Kubernetes manifests
        run: |
          if [ -f k8s/kustomization.yaml ]; then
            kubectl kustomize k8s
          else
            echo "Kubernetes manifests will be added in a later phase."
          fi

