apiVersion: batch/v1
kind: Job
metadata:
  name: weather-ingest
  namespace: weather-mlops
  labels:
    app.kubernetes.io/name: weather-ingest
    app.kubernetes.io/part-of: weather-mlops
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: weather-ingest
        app.kubernetes.io/part-of: weather-mlops
    spec:
      restartPolicy: Never
      containers:
        - name: ingest
          image: weather-mlops-api:local
          imagePullPolicy: IfNotPresent
          command: ["python", "-m", "src.jobs.ingest"]
          envFrom:
            - configMapRef:
                name: weather-api-config
            - secretRef:
                name: weather-api-secret
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
