apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-api
  namespace: weather-mlops
  labels:
    app.kubernetes.io/name: weather-api
    app.kubernetes.io/part-of: weather-mlops
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: weather-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: weather-api
        app.kubernetes.io/part-of: weather-mlops
    spec:
      containers:
        - name: api
          image: weather-mlops-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: weather-api-config
            - secretRef:
                name: weather-api-secret
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
